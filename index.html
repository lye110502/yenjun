<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#020304" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="교환일기" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
  <title>교환일기</title>
</head>
<body>
  <section id="login" class="login-card">
    <div class="mini-star">★</div>
    <h1>교환일기</h1>
    <input id="password" type="password" placeholder="비밀번호" autocomplete="current-password" />
    <button class="primary" onclick="login()">열기</button>
    <div id="loginStatus" class="status"></div>
  </section>

  <main id="app" class="page hidden">
    <header class="hero">
      <button class="settings-btn" onclick="openSettings()">⚙</button>
      <div class="mini-star">★</div>
      <h1 id="pageTitle">교환일기</h1>
      <div id="todayLine" class="today-line"></div>
      <div id="ddayLine" class="dday-line"></div>
    </header>

    <section id="screen-home" class="screen active">
      <div class="home-grid">
        <button class="home-card" onclick="switchScreen('letters')"><span>💌</span><b>편지</b><small id="homeLetterCount">기록 불러오는 중</small></button>
        <button class="home-card" onclick="switchScreen('calendar')"><span>📅</span><b>캘린더</b><small>날짜별 기록 보기</small></button>
        <button class="home-card" onclick="switchScreen('songs')"><span>🎧</span><b>오노추</b><small>오늘의 노래 추천</small></button>
        <button class="home-card" onclick="switchScreen('week')"><span>✅</span><b>이번주</b><small>같이 하고 싶은 것</small></button>
        <button class="home-card" onclick="switchScreen('memories')"><span>📷</span><b>추억</b><small>사진과 순간들</small></button>
        <button class="home-card" onclick="switchScreen('capsules')"><span>🔒</span><b>타임캡슐</b><small>정해진 날 열리는 편지</small></button>
      </div>
    </section>

    <section id="screen-letters" class="screen">
      <div class="grid">
        <div class="panel">
          <div class="panel-head"><h2>편지 쓰기</h2><span>✎</span></div>
          <div class="two-col">
            <div><label>작성자</label><select id="letterWriter"><option value="예은">예은</option><option value="준희">준희</option></select></div>
            <div><label>오늘 기분</label><input id="letterMood" placeholder="예: 보고싶음" /></div>
          </div>
          <label>제목</label><input id="letterTitle" placeholder="제목" />
          <label>내용</label><textarea id="letterContent" placeholder="오늘의 이야기를 적어주세요"></textarea>
          <label>오노추 링크 첨부</label><input id="letterSong" placeholder="유튜브 링크 선택 입력" />
          <label>사진 URL 첨부</label><input id="letterPhoto" placeholder="이미지 주소 선택 입력" />
          <button id="letterSaveBtn" class="primary" onclick="saveLetter()">저장하기</button>
          <div id="letterStatus" class="status"></div>
        </div>
        <div class="panel">
          <div class="panel-head"><h2>편지 목록</h2><button class="icon-btn" onclick="loadAll()">↻</button></div>
          <div id="lettersList" class="list"><div class="empty">불러오는 중</div></div>
        </div>
      </div>
    </section>

    <section id="screen-calendar" class="screen">
      <div class="panel full-panel">
        <div class="panel-head"><button class="icon-btn" onclick="changeMonth(-1)">‹</button><h2 id="calendarTitle">캘린더</h2><button class="icon-btn" onclick="changeMonth(1)">›</button></div>
        <div class="weekdays"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div>
        <div id="calendarGrid" class="calendar-grid"></div>
        <div id="dayRecords" class="day-records empty">날짜를 누르면 그날 기록이 보여요.</div>
      </div>
    </section>

    <section id="screen-songs" class="screen">
      <div class="grid">
        <div class="panel">
          <div class="panel-head"><h2>오노추</h2><span>🎧</span></div>
          <div class="two-col">
            <div><label>추천자</label><select id="songWriter"><option value="예은">예은</option><option value="준희">준희</option></select></div>
            <div><label>제목</label><input id="songTitle" placeholder="노래 제목" /></div>
          </div>
          <label>가수</label><input id="songArtist" placeholder="가수" />
          <label>유튜브 링크</label><input id="songUrl" placeholder="https://youtu.be/..." oninput="previewSong()" />
          <div id="songPreview" class="song-preview hidden"></div>
          <button class="primary" onclick="saveSong()">오노추 저장</button>
          <div id="songStatus" class="status"></div>
        </div>
        <div class="panel">
          <div class="panel-head"><h2>추천 목록</h2><button class="icon-btn" onclick="loadAll()">↻</button></div>
          <div id="songsList" class="list"></div>
        </div>
      </div>
    </section>

    <section id="screen-week" class="screen">
      <div class="panel full-panel">
        <div class="panel-head"><h2>이번주</h2><span>✅</span></div>
        <div class="todo-input-row">
          <select id="todoWriter"><option value="예은">예은</option><option value="준희">준희</option></select>
          <input id="todoText" placeholder="이번주에 같이 하고 싶은 것" />
          <button class="small-primary" onclick="saveTodo()">추가</button>
        </div>
        <div id="todosList" class="list"></div>
      </div>
    </section>

    <section id="screen-memories" class="screen">
      <div class="grid">
        <div class="panel">
          <div class="panel-head"><h2>추억 추가</h2><span>📷</span></div>
          <div class="two-col">
            <div><label>작성자</label><select id="memoryWriter"><option value="예은">예은</option><option value="준희">준희</option></select></div>
            <div><label>제목</label><input id="memoryTitle" placeholder="사진 제목" /></div>
          </div>
          <label>사진 URL</label><input id="memoryUrl" placeholder="이미지 주소" />
          <label>메모</label><textarea id="memoryMemo" class="small-area" placeholder="짧은 메모"></textarea>
          <button class="primary" onclick="saveMemory()">추억 저장</button>
          <div id="memoryStatus" class="status"></div>
        </div>
        <div class="panel">
          <div class="panel-head"><h2>추억 앨범</h2><button class="icon-btn" onclick="loadAll()">↻</button></div>
          <div id="memoriesList" class="memory-grid"></div>
        </div>
      </div>
    </section>

    <section id="screen-capsules" class="screen">
      <div class="grid">
        <div class="panel">
          <div class="panel-head"><h2>타임캡슐</h2><span>🔒</span></div>
          <div class="two-col">
            <div><label>작성자</label><select id="capsuleWriter"><option value="예은">예은</option><option value="준희">준희</option></select></div>
            <div><label>열리는 날짜</label><input id="capsuleOpenDate" type="date" /></div>
          </div>
          <label>제목</label><input id="capsuleTitle" placeholder="예: 1000일 편지" />
          <label>내용</label><textarea id="capsuleContent" placeholder="그날 열릴 편지를 적어주세요"></textarea>
          <button class="primary" onclick="saveCapsule()">캡슐 저장</button>
          <div id="capsuleStatus" class="status"></div>
        </div>
        <div class="panel">
          <div class="panel-head"><h2>캡슐 목록</h2><button class="icon-btn" onclick="loadAll()">↻</button></div>
          <div id="capsulesList" class="list"></div>
        </div>
      </div>
    </section>

    <nav class="tabbar">
      <button class="tab active" onclick="switchScreen('home')">★</button>
      <button class="tab" onclick="switchScreen('letters')">💌</button>
      <button class="tab" onclick="switchScreen('calendar')">📅</button>
      <button class="tab" onclick="switchScreen('songs')">🎧</button>
      <button class="tab" onclick="switchScreen('week')">✅</button>
      <button class="tab" onclick="switchScreen('memories')">📷</button>
      <button class="tab" onclick="switchScreen('capsules')">🔒</button>
    </nav>
  </main>

  <dialog id="detailDialog"><div class="modal"><h3 id="modalTitle"></h3><div id="modalMeta" class="letter-meta"></div><div id="modalBody" class="modal-body"></div><div id="commentsBox"></div><div id="commentForm" class="comment-form hidden"><input id="commentWriter" placeholder="작성자" value="예은"/><input id="commentText" placeholder="댓글"/><button onclick="saveComment()">등록</button></div><div class="modal-actions"><button class="secondary" onclick="detailDialog.close()">닫기</button><button id="likeBtn" class="secondary hidden" onclick="likeCurrent()">♡ 좋아요</button><button id="deleteBtn" class="danger hidden" onclick="deleteCurrent()">삭제</button></div></div></dialog>
  <dialog id="settingsDialog"><div class="modal"><h3>설정</h3><label>비밀번호</label><input id="settingsPassword" value="0418"/><label>기념일</label><input id="settingsStart" type="date" value="2024-04-18"/><button class="primary" onclick="saveSettings()">저장</button><div class="modal-actions"><button class="secondary" onclick="settingsDialog.close()">닫기</button></div></div></dialog>

  <script src="script.js"></script>
</body>
</html>
