<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>교환일기</title>
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="교환일기" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="login" class="login-wrap">
    <section class="phone login-card">
      <div class="statusbar"><span>9:41</span><span>●●●</span></div>
      <div class="brand-star">★</div>
      <h1>교환일기</h1>
      <p>둘만의 기록을 열어볼까요</p>
      <input id="password" type="password" placeholder="비밀번호" inputmode="numeric" />
      <button class="primary" id="loginBtn">열기</button>
      <div id="loginStatus" class="status-text"></div>
    </section>
  </div>

  <main id="app" class="app hidden">
    <section class="phone shell">
      <div class="statusbar"><span>9:41</span><span>●●●</span></div>
      <header class="topbar">
        <button class="plain-btn back-btn hidden" id="backBtn">‹</button>
        <div>
          <div class="app-title" id="screenTitle">교환일기</div>
          <div class="app-sub" id="screenSub">오늘도 기록하기</div>
        </div>
        <button class="plain-btn" data-screen="settings">⚙</button>
      </header>

      <div class="screen-stack">
        <section id="home" class="screen active">
          <div class="home-logo">★</div>
          <h2>교환일기</h2>
          <div class="today-card">
            <b id="todayText">오늘</b>
            <span id="ddayText">D+0</span>
          </div>
          <div class="home-menu">
            <button data-screen="letters"><span>✉</span><b>편지</b></button>
            <button data-screen="calendar"><span>▣</span><b>캘린더</b></button>
            <button data-screen="songs"><span>♫</span><b>오노추</b></button>
            <button data-screen="week"><span>✓</span><b>이번주</b></button>
            <button data-screen="memories"><span>▧</span><b>추억</b></button>
            <button data-screen="capsule"><span>🔒</span><b>타임캡슐</b></button>
          </div>
          <div class="mini-panel">
            <div class="mini-panel-title">이번주 할 일</div>
            <div id="homeTodo"></div>
          </div>
        </section>

        <section id="letters" class="screen">
          <div class="segmented"><button class="active" data-filter="all">전체</button><button data-filter="예은">예은</button><button data-filter="준희">준희</button></div>
          <div id="letterList" class="scroll-list"></div>
          <button class="fab" data-screen="write">＋</button>
        </section>

        <section id="write" class="screen">
          <div class="form-card">
            <label>작성자</label>
            <select id="writer"><option value="예은">예은</option><option value="준희">준희</option></select>
            <label>오늘 기분</label>
            <div class="moods" id="moods"><button data-mood="😀">😀</button><button data-mood="🙂">🙂</button><button data-mood="🥲">🥲</button><button data-mood="😍">😍</button></div>
            <label>제목</label><input id="letterTitle" placeholder="제목을 입력해요" />
            <label>내용</label><textarea id="letterContent" placeholder="마음을 적어보세요..."></textarea>
            <label>사진</label>
            <input id="letterPhotoFile" class="hidden" type="file" accept="image/*" />
            <button class="outline" id="pickLetterPhoto">▧ 사진 추가</button>
            <img id="letterPhotoPreview" class="preview hidden" />
            <label>오노추 유튜브 링크</label><input id="letterSong" placeholder="유튜브 링크를 붙여넣어요" />
            <div id="letterSongPreview"></div>
            <label class="checkline"><input id="isCapsule" type="checkbox" /> 타임캡슐로 설정</label>
            <div id="capsuleDateWrap" class="hidden"><label>열리는 날짜</label><input id="capsuleDate" type="date" /></div>
            <button class="primary" id="saveLetterBtn">보내기</button>
            <div id="letterStatus" class="status-text"></div>
          </div>
        </section>

        <section id="calendar" class="screen">
          <div class="calendar-head"><button id="prevMonth">‹</button><b id="monthLabel">2026년 7월</b><button id="nextMonth">›</button></div>
          <div class="weekline"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div>
          <div id="calendarGrid" class="calendar-grid"></div>
          <div class="day-detail" id="dayDetail">날짜를 누르면 기록이 보여요.</div>
        </section>

        <section id="songs" class="screen">
          <div class="inline-form"><input id="songLink" placeholder="유튜브 링크를 붙여넣어요" /><button id="addSong">추가</button></div>
          <div id="songList" class="scroll-list"></div>
        </section>

        <section id="week" class="screen">
          <div class="inline-form"><input id="todoText" placeholder="이번주에 하고 싶은 것" /><button id="addTodo">추가</button></div>
          <div id="todoList" class="scroll-list"></div>
        </section>

        <section id="memories" class="screen">
          <div class="form-card slim">
            <input id="memoryTitle" placeholder="추억 제목" />
            <input id="memoryFile" class="hidden" type="file" accept="image/*" />
            <button class="outline" id="pickMemory">▧ 사진 추가</button>
            <img id="memoryPreview" class="preview hidden" />
            <textarea id="memoryMemo" class="small-textarea" placeholder="짧은 메모"></textarea>
            <button class="primary" id="saveMemory">저장</button>
          </div>
          <div id="memoryList" class="memory-grid"></div>
        </section>

        <section id="capsule" class="screen">
          <div id="capsuleList" class="scroll-list"></div>
        </section>

        <section id="settings" class="screen">
          <div class="setting-list">
            <button>비밀번호 변경 <span>›</span></button>
            <button>알림 설정 <span>›</span></button>
            <button>데이터 백업 <span>›</span></button>
            <button>앱 정보 <span>›</span></button>
          </div>
        </section>
      </div>

      <nav class="tabbar">
        <button class="active" data-screen="home">⌂<small>홈</small></button>
        <button data-screen="letters">✉<small>편지</small></button>
        <button data-screen="calendar">▣<small>캘린더</small></button>
        <button data-screen="songs">♫<small>오노추</small></button>
        <button data-screen="week">✓<small>이번주</small></button>
      </nav>
    </section>
  </main>

  <dialog id="detailDialog"><div class="modal"><button class="modal-close" onclick="detailDialog.close()">×</button><div id="detailContent"></div></div></dialog>
  <script src="script.js"></script>
</body>
</html>
